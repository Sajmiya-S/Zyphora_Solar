<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Zyphora Solar | Team Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="/static/css/public_view/login.css">
</head>

<body>
<div class="container">
    <div class="row justify-content-center align-items-center vh-100">

        <div class="col-md-4">

            <div class="card shadow-lg border-0 p-4 login-card">

                <h2 class="text-center mb-3">
                    <a href="{% url 'home' %}">
                        <span class="fw-bold text-dark">Zyphora</span>
                        <span class="fw-bold text-warning">Solar</span>
                    </a>
                    
                </h2>

                <p class="text-center text-muted mb-4">Staff Login Portal</p>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <input type="text" 
                               name="username" 
                               class="form-control" 
                               placeholder="Enter Username" 
                               required>
                    </div>

                    <div class="mb-3">
                        <input type="password" 
                               name="password" 
                               class="form-control" 
                               placeholder="Enter Password" 
                               required>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning fw-bold">
                            Login
                        </button>
                    </div>
                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
