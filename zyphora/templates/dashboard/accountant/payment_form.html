{% extends "dashboard/dashboard.html" %}

{% block content %}
<div class="container mt-5">

    <!-- Breadcrumbs -->
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{% url request.user.role %}">{{request.user.role|title}} Dashboard</a></li>
            <li class="breadcrumb-item active" aria-current="page">{{ title }}</li>
        </ol>
    </nav>

    <!-- Card Form -->
    <div class="card shadow border-0">
        <div class="card-header bg-primary text-white">
            <h5 class="mb-0"><i class="bi bi-cash-stack me-2"></i>{{ title }}</h5>
        </div>
        <div class="card-body">
            <form method="POST">
                {% csrf_token %}
                <div class="row g-4">

                    <!-- Invoice -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Invoice</label>
                        {{ form.invoice }}
                    </div>

                    <!-- Payment Date -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Payment Date</label>
                        {{ form.payment_date }}
                    </div>

                    <!-- Amount -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Amount</label>
                        {{ form.amount }}
                    </div>

                    <!-- Payment Method -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Payment Method</label>
                        {{ form.method }}
                    </div>

                    <!-- Received By -->
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Received By</label>
                        {{ form.received_by }}
                    </div>

                    <!-- Notes -->
                    <div class="col-12">
                        <label class="form-label fw-bold">Notes</label>
                        {{ form.notes }}
                    </div>

                </div>

                <!-- Form Actions -->
                <div class="mt-4 d-flex justify-content-end gap-2">
                    <button type="submit" class="btn btn-success btn-lg">
                        <i class="bi bi-check-circle me-1"></i> Save
                    </button>
                    <a href="{% url 'client_payments' %}" class="btn btn-outline-secondary btn-lg">
                        <i class="bi bi-x-circle me-1"></i> Cancel
                    </a>
                </div>

            </form>
        </div>
    </div>

</div>
{% endblock %}
