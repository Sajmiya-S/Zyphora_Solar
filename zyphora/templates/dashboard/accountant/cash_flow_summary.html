{% extends 'dashboard/dashboard.html' %}
{% block content %}
<div class="container-fluid mt-4">
    <h2>Cash Flow Summary</h2>
    <div class="row">
        <div class="col-md-4">
            <div class="card text-white bg-success mb-3">
                <div class="card-body">
                    <h5 class="card-title">Total Received</h5>
                    <p class="card-text">₹{{ total_received }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-danger mb-3">
                <div class="card-body">
                    <h5 class="card-title">Total Expenses</h5>
                    <p class="card-text">₹{{ total_expenses }}</p>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-primary mb-3">
                <div class="card-body">
                    <h5 class="card-title">Net Cash Flow</h5>
                    <p class="card-text">₹{{ net_cash_flow }}</p>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
