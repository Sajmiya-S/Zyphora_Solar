{% extends "dashboard/base.html" %}
{% block content %}
<h3>Tasks - {{ filter|title }}</h3>
<table class="table table-striped">
    <thead>
        <tr>
            <th>Title</th>
            <th>Status</th>
            <th>Due Date</th>
        </tr>
    </thead>
    <tbody>
        {% for task in tasks %}
        <tr>
            <td>{{ task.title }}</td>
            <td>{{ task.status }}</td>
            <td>{{ task.due_date }}</td>
        </tr>
        {% empty %}
        <tr><td colspan="3">No tasks found.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
