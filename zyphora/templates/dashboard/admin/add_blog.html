{% extends 'dashboard/dashboard.html' %}
{% load static %}

{% block link %}
<link rel="stylesheet" href="{% static 'css/dashboard/admin/add_blog.css' %}">
{% endblock %}

{% block content %}

<nav aria-label="breadcrumb">
  <ol class="breadcrumb mb-0">
    <li class="breadcrumb-item">
        <a href="{% url 'admin' %}">Admin Dashboard</a>
    </li>
    <li class="breadcrumb-item">
        <a href="{% url 'blogposts' %}">Blog Posts</a>
    </li>
    <li class="breadcrumb-item active" aria-current="page">
        Add Blog Post
    </li>
  </ol>
</nav>

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Add Blog Post</h1>
    <a href="{% url 'blogposts' %}" class="btn btn-secondary">
        Back
    </a>
</div>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="card p-4 mb-4">

{{ form }}

</div>

<div class="d-flex justify-content-between">

<button type="submit" class="btn btn-success">
<i class="bi bi-check-lg"></i> Publish Post
</button>

<a href="{% url 'blogposts' %}" class="btn btn-danger">
<i class="bi bi-x-lg"></i> Cancel
</a>

</div>

</form>

</div>

{% endblock %}
