{% extends 'dashboard/dashboard.html' %}
{% load static %}

{% block link %}
<link rel="stylesheet" href="{% static 'css/dashboard/admin/edit_blog.css' %}">
{% endblock %}

{% block content %}

<nav aria-label="breadcrumb">
  <ol class="breadcrumb mb-0">
    <li class="breadcrumb-item">
        <a href="{% url 'admin' %}">Admin Dashboard</a>
    </li>
    <li class="breadcrumb-item">
        <a href="{% url 'blogposts' %}">Blog Posts</a>
    </li>
    <li class="breadcrumb-item">
        <a href="{% url 'viewpost' post.id %}">View Blog</a>
    </li>
    <li class="breadcrumb-item active" aria-current="page">
        Edit Blog Post
    </li>
  </ol>
</nav>

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-3">
    <h1>Edit Post</h1>
    <a href="{% url 'viewpost' post.id %}" class="btn btn-secondary">Back to Post</a>
</div>

<form method="POST" enctype="multipart/form-data">
{% csrf_token %}

<div class="row">

<div class="col-md-12">
<div class="card mb-4 p-4">

<!-- TITLE -->
<div class="mb-3">
<label class="form-label">Title</label>
<input type="text" name="title" value="{{ post.title }}" class="form-control">
</div>

<!-- SUMMARY -->
<div class="mb-3">
<label class="form-label">Summary</label>
<textarea name="summary" rows="3" class="form-control">{{ post.summary }}</textarea>
</div>

<!-- CONTENT -->
<div class="mb-3">
<label class="form-label">Content</label>
<textarea name="content" rows="12" class="form-control">{{ post.content }}</textarea>
</div>

<!-- IMAGE -->
<div class="mb-3">
<label class="form-label">Image</label>
<input type="file" name="image" class="form-control">
</div>

{% if post.image %}
<div class="mb-3">
<p>Current Image:</p>
<img src="{{ post.image.url }}" style="max-width:200px;">
</div>
{% endif %}

</div>
</div>

</div>

<div class="d-flex justify-content-between align-items-center mb-3">
<button type="submit" class="btn btn-success">
<i class="bi bi-check-lg"></i> Save Changes
</button>

<a href="{% url 'viewpost' post.id %}" class="btn btn-secondary">
<i class="bi bi-x-lg"></i> Cancel
</a>
</div>

</form>

</div>

{% endblock %}
