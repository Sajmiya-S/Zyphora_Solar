{% extends "dashboard/dashboard.html" %}

{% block content %}

<!-- Breadcrumbs -->
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="{% url 'dashboard' %}">Dashboard</a></li>
    <li class="breadcrumb-item"><a href="{% url 'material_list' %}">Materials</a></li>
    <li class="breadcrumb-item active" aria-current="page">Edit Material</li>
  </ol>
</nav>

<h4>Edit Material: {{ material.name }}</h4>

<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Save Changes</button>
    <a href="{% url 'material_list' %}" class="btn btn-secondary">Cancel</a>
</form>

{% endblock %}
