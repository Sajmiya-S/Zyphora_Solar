{% extends 'dashboard/dashboard.html' %}

{% block content %}

<div class="container mt-4">

<nav aria-label="breadcrumb">
<ol class="breadcrumb">

<li class="breadcrumb-item">
<a href="{% url request.user.role %}">
{{request.user.role|title}} Dashboard
</a>
</li>

<li class="breadcrumb-item active">
Project Gallery
</li>

</ol>
</nav>

<h3 class="mt-3">Select Project</h3>

<div class="row mt-4">

{% for project in projects %}

<div class="col-md-4 mb-4">

<div class="card shadow-sm h-100">

<div class="card-body">

<h5 class="card-title">{{ project.title }}</h5>

<p class="text-muted small">

{{ project.project_type }}

</p>

<a href="{% url 'project_gallery' project.id %}?next=gallery"
class="btn btn-outline-primary btn-sm">

<i class="bi bi-images"></i> Open Gallery

</a>

</div>

</div>

</div>

{% empty %}

<div class="text-center p-5">

<i class="bi bi-folder fs-1 text-muted"></i>

<p class="text-muted mt-3">
No projects available.
</p>

</div>

{% endfor %}

</div>

</div>

{% endblock %}
