{% extends 'dashboard/dashboard.html' %}
{% block content %}

<!-- Breadcrumb -->
<nav aria-label="breadcrumb" class="mb-3">
  <ol class="breadcrumb">
    <li class="breadcrumb-item">
        <a href="{% url request.user.role %}">
            {{ request.user.role|title }} Dashboard
        </a>
    </li>
    <li class="breadcrumb-item">
        <a href="{% url 'feasibility_list' %}">
            Feasibility Study
        </a>
        
    </li>
    <li class="breadcrumb-item active">
        Create Feasibility Report
    </li>
  </ol>
</nav>
<div class="container mt-4">

    <h3 class="mb-4 text-primary">
        <i class="bi bi-clipboard-plus"></i> Create Feasibility Report
    </h3>

    <form method="POST" class="card shadow-sm p-4">
        {% csrf_token %}

        <!-- Project Selection -->
        <div class="mb-3">
            <label class="form-label">Select Project</label>
            <select name="project" class="form-select" required>
                <option value="">-- Select Project --</option>
                {% for p in projects %}
                    <option value="{{ p.id }}">
                        {{ p.title }} - {{ p.lead.name }}
                    </option>
                {% endfor %}
            </select>
        </div>

        <!-- Site Details -->
        <h5 class="mt-3">Site Details</h5>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label>Site Type</label>
                <select name="site_type" class="form-select">
                    <option value="residential">Residential</option>
                    <option value="commercial">Commercial</option>
                    <option value="industrial">Industrial</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label>Roof Type</label>
                <select name="roof_type" class="form-select">
                    <option value="rcc">RCC</option>
                    <option value="metal">Metal</option>
                    <option value="tile">Tile</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label>Roof Area (sq.ft)</label>
                <input type="number" name="roof_area" class="form-control">
            </div>
        </div>

        <!-- Technical -->
        <h5>Technical Details</h5>

        <div class="row">
            <div class="col-md-4 mb-3">
                <label>Shadow</label>
                <select name="shadow_analysis" class="form-select">
                    <option value="none">No Shading</option>
                    <option value="partial">Partial</option>
                    <option value="heavy">Heavy</option>
                </select>
            </div>

            <div class="col-md-4 mb-3">
                <label>Orientation</label>
                <select name="orientation" class="form-select">
                    <option value="north">North</option>
                    <option value="south">South</option>
                    <option value="east">East</option>
                    <option value="west">West</option>
                </select>
            </div>
        </div>

        <!-- Electrical -->
        <h5>Electrical</h5>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Connection Type</label>
                <select name="connection_type" class="form-select">
                    <option value="single_phase">Single Phase</option>
                    <option value="three_phase">Three Phase</option>
                </select>
            </div>

            <div class="col-md-6 mb-3">
                <label>Monthly Consumption</label>
                <input type="number" name="monthly_consumption" class="form-control">
            </div>
        </div>

        <!-- Recommendation -->
        <h5>Recommendation</h5>

        <div class="row">
            <div class="col-md-6 mb-3">
                <label>Suggested Capacity (kW)</label>
                <input type="number" step="0.1" name="suggested_capacity" class="form-control">
            </div>

            <div class="col-md-6 mb-3">
                <label>System Type</label>
                <select name="system_type" class="form-select">
                    <option value="on_grid">On Grid</option>
                    <option value="off_grid">Off Grid</option>
                    <option value="hybrid">Hybrid</option>
                </select>
            </div>
        </div>

        <!-- Remarks -->
        <div class="mb-3">
            <label>Remarks</label>
            <textarea name="remarks" class="form-control" rows="3"></textarea>
        </div>

        <!-- Submit -->
        <div class="text-end">
            <button type="submit" class="btn btn-success">
                <i class="bi bi-check-circle"></i> Submit Feasibility
            </button>
        </div>

    </form>

</div>

{% endblock %}
