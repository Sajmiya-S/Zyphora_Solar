{% extends "dashboard/dashboard.html" %}
{% block content %}

<div class="container-fluid">

    <h4 class="fw-bold mb-3">Licensing Tasks</h4>

    <div class="row g-3">

        {% for item in project_data %}
        <div class="col-md-4">

            <div class="card shadow-sm border-0 h-100">

                <div class="card-body">

                    <h5 class="fw-bold">{{ item.project.title }}</h5>

                    <p class="text-muted small">
                        {{ item.project.location }}
                    </p>

                    <!-- PROGRESS -->
                    <div class="mb-2">
                        <small>Progress</small>
                        <div class="progress">
                            <div class="progress-bar bg-info"
                                style="width: {{ item.progress }}%">
                                {{ item.progress }}%
                            </div>
                        </div>
                    </div>

                    <!-- TASK COUNT -->
                    <p class="small">
                        Pending Tasks: {{ item.pending_tasks }}
                    </p>

                    <!-- OPEN -->
                    <a href="{% url 'licensing_dashboard' item.project.id %}"
                    class="btn btn-success btn-sm w-100">
                    Proceed to Licensing Tasks
                    </a>

                </div>

            </div>

        </div>
        {% endfor %}

    </div>

</div>

{% endblock %}
